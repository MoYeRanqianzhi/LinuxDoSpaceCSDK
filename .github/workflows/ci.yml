name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: c-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Example
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Build example
        run: gcc -std=c11 -Iinclude src/sdk.c examples/simple.c -o linuxdospace-c-example

      - name: Run example
        run: ./linuxdospace-c-example
